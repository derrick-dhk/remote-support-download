<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Remote Support Download</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: #111827;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        h1 {
            margin-bottom: 10px;
            font-size: 24px;
        }

        p {
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 30px;
        }

        .download-btn {
            display: inline-block;
            padding: 15px 25px;
            font-size: 16px;
            font-weight: bold;
            text-decoration: none;
            color: white;
            background: #2563eb;
            border-radius: 8px;
            transition: 0.3s ease;
        }

        .download-btn:hover {
            background: #1d4ed8;
        }

        .note {
            margin-top: 20px;
            font-size: 12px;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Remote Support Tool</h1>
        <p>Click the button below to download and install the remote support agent.</p>

        <a class="download-btn" href="YOUR_DOWNLOAD_LINK_HERE">
            Download Support Agent
        </a>

        <div class="note">
            If prompted, click "Run" and allow installation.
        </div>
    </div>
</body>
</html>
